{% extends "base.html" %}
{% block title %}Add product{% endblock %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Add a product</h1>
    <p>A Code128 barcode is generated automatically from the SKU you enter.</p>
  </div>
</div>

<div class="card" style="max-width: 640px; padding: 32px;">
  <form action="{{ url_for('product_new') }}" method="POST">
    <div class="field-row">
      <div class="field">
        <label for="sku">SKU</label>
        <input type="text" id="sku" name="sku" placeholder="WH-FORK-3341" required>
      </div>
      <div class="field">
        <label for="name">Product name</label>
        <input type="text" id="name" name="name" placeholder="Heavy-duty forklift tire" required>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="category">Category</label>
        <input type="text" id="category" name="category" placeholder="Material handling">
      </div>
      <div class="field">
        <label for="supplier_id">Supplier</label>
        <select id="supplier_id" name="supplier_id">
          <option value="">— None —</option>
          {% for s in suppliers %}
          <option value="{{ s.id }}">{{ s.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="quantity">Starting quantity</label>
        <input type="number" id="quantity" name="quantity" value="0" min="0">
      </div>
      <div class="field">
        <label for="unit_price">Unit price ($)</label>
        <input type="number" id="unit_price" name="unit_price" value="0" min="0" step="0.01">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="reorder_threshold">Reorder threshold</label>
        <input type="number" id="reorder_threshold" name="reorder_threshold" value="10" min="0">
      </div>
      <div class="field">
        <label for="aisle">Aisle / Bin</label>
        <div style="display:flex; gap: 8px;">
          <input type="text" id="aisle" name="aisle" placeholder="Aisle (A)" value="A" style="width: 45%;">
          <input type="text" id="bin" name="bin" placeholder="Bin (4)" value="1" style="width: 55%;">
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block">Save & generate barcode</button>
  </form>
</div>
{% endblock %}
